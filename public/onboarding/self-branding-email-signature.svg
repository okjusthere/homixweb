<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="720" viewBox="0 0 1600 720" role="img" aria-labelledby="title desc">
  <title id="title">Homix email signature template</title>
  <desc id="desc">Recommended Homix email signature structure with a short Gmail setup guide.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdf8"/>
      <stop offset="1" stop-color="#f3eadc"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#3c2c1f" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1600" height="720" fill="#eee8df"/>
  <rect x="70" y="60" width="1460" height="600" rx="20" fill="url(#paper)" filter="url(#softShadow)"/>

  <!-- Header bar -->
  <path d="M70 80 a20 20 0 0 1 20 -20 h1420 a20 20 0 0 1 20 20 v60 h-1460 z" fill="#9f753f"/>
  <text x="116" y="122" fill="#fffaf0" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" letter-spacing="1">EMAIL SIGNATURE</text>
  <text x="1484" y="120" fill="#fceede" font-family="Arial, Helvetica, sans-serif" font-size="22" text-anchor="end">HOMIX REALTY INC</text>

  <!-- Column divider -->
  <line x1="860" y1="180" x2="860" y2="628" stroke="#e3d6bf" stroke-width="2"/>

  <!-- LEFT: signature template -->
  <rect x="150" y="196" width="4" height="392" fill="#9f753f"/>

  <text x="190" y="252" fill="#1d1b18" font-family="Georgia, 'Times New Roman', serif" font-size="50">Your Name</text>
  <text x="190" y="298" fill="#6e6255" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Licensed Real Estate Salesperson</text>
  <text x="190" y="340" fill="#2d2924" font-family="Arial, Helvetica, sans-serif" font-size="25">HOMIX REALTY INC</text>
  <text x="190" y="382" fill="#2d2924" font-family="Arial, Helvetica, sans-serif" font-size="25">M: your personal number</text>

  <line x1="190" y1="410" x2="800" y2="410" stroke="#b9a888" stroke-width="2" stroke-dasharray="5 6"/>

  <text x="190" y="456" font-family="Arial, Helvetica, sans-serif" font-size="25">
    <tspan fill="#1a55c4" text-decoration="underline">HOMIX Web</tspan><tspan fill="#8a8176">  |  </tspan><tspan fill="#1a55c4" text-decoration="underline">RED</tspan><tspan fill="#8a8176">  |  </tspan><tspan fill="#1a55c4" text-decoration="underline">TikTok</tspan>
  </text>
  <text x="190" y="500" fill="#2d2924" font-family="Arial, Helvetica, sans-serif" font-size="25">HOMIX REALTY INC</text>
  <text x="190" y="542" fill="#2d2924" font-family="Arial, Helvetica, sans-serif" font-size="25">37-20 Prince St, Suite 3H, Flushing, NY 11354</text>
  <text x="190" y="584" fill="#2d2924" font-family="Arial, Helvetica, sans-serif" font-size="25">Office: 929-688-9886</text>

  <!-- RIGHT: Gmail setup steps -->
  <text x="922" y="236" fill="#9f753f" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" letter-spacing="2">HOW TO ADD IT IN GMAIL</text>

  <g font-family="Arial, Helvetica, sans-serif">
    <text x="922" y="312" fill="#cdb893" font-size="34" font-weight="700">01</text>
    <text x="982" y="300" fill="#2d2924" font-size="24">Open Gmail, then Settings &#8594;</text>
    <text x="982" y="332" fill="#2d2924" font-size="24">See all settings.</text>

    <text x="922" y="402" fill="#cdb893" font-size="34" font-weight="700">02</text>
    <text x="982" y="390" fill="#2d2924" font-size="24">In the Signature section,</text>
    <text x="982" y="422" fill="#2d2924" font-size="24">click Create new.</text>

    <text x="922" y="492" fill="#cdb893" font-size="34" font-weight="700">03</text>
    <text x="982" y="480" fill="#2d2924" font-size="24">Paste this template and fill in</text>
    <text x="982" y="512" fill="#2d2924" font-size="24">your name and number.</text>

    <text x="922" y="582" fill="#cdb893" font-size="34" font-weight="700">04</text>
    <text x="982" y="570" fill="#2d2924" font-size="24">Click Save Changes at the</text>
    <text x="982" y="602" fill="#2d2924" font-size="24">bottom of the page.</text>
  </g>
</svg>
